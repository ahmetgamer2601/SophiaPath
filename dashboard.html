<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SophiaPath | Antik Bilgelik ve Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">

    <div class="app-layout">
        <aside class="sidebar" id="mainSidebar">
            <div class="brand-logo">
                <i class="fa-solid fa-building-columns"></i> 
                <span>SophiaPath</span>
            </div>

            <nav class="side-nav">
                <button class="nav-btn active" data-target="home-section">
                    <i class="fa-solid fa-house"></i> 
                    <span>Ana Sayfa</span>
                </button>
                <button class="nav-btn" data-target="arena-section">
                    <i class="fa-solid fa-shield-halved"></i> 
                    <span>Arena (PvP)</span>
                </button>
                <button class="nav-btn" data-target="collection-section">
                    <i class="fa-solid fa-box-archive"></i> 
                    <span>Koleksiyon</span>
                </button>
            </nav>

            <div class="user-quick-card">
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?background=1DB954&color=fff" id="sidebarAvatar" alt="Avatar">
                </div>
                <div class="user-meta">
                    <span class="u-name" id="topUsername">Yükleniyor...</span>
                    <span class="u-rank" id="topRank">Gezgin</span>
                </div>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="glass-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Fikirlerde yolculuğa çık...">
                </div>
                <div class="header-tools">
                    <div class="stat-badge">
                        <i class="fa-solid fa-fire"></i>
                        <span id="headerPoints">0</span>
                    </div>
                    <button class="action-icon-btn admin-only hidden" onclick="openModal('adminModal')">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    <button class="icon-btn logout-btn" id="logoutBtn">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </header>

            <section id="home-section" class="page-section">
                <div class="welcome-hero">
                    <h1>Hoş geldin, <span id="heroName">Gezgin</span></h1>
                    <p>Felsefe taşını bulmaya hazır mısın?</p>
                </div>
                
                <div class="section-container">
                    <div class="section-header">
                        <h2>Popüler Filozoflar</h2>
                    </div>
                    <div class="phi-grid" id="phiGrid">
                        </div>
                </div>
            </section>

            <section id="arena-section" class="page-section hidden">
                <div class="arena-container">
                    <div id="arena-lobby" class="arena-card">
                        <i class="fa-solid fa-hand-fist arena-icon"></i>
                        <h2>Zihinsel Arena</h2>
                        <p>Diğer gezginlerle fikir düellosuna gir, bilgeliğini kanıtla!</p>
                        <button class="action-btn" id="findMatchBtn">Düello Ara</button>
                    </div>
                </div>
            </section>

            <section id="collection-section" class="page-section hidden">
                <div class="section-title">
                    <h2>Bilgelik Çantan</h2>
                    <p>Keşfettiğin filozoflar ve kazandığın kartlar burada listelenir.</p>
                </div>
                <div class="phi-grid" id="collectionGrid">
                    </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="readModal">
        <div class="modal-container read-container">
            <button class="close-btn float-close" onclick="closeModal('readModal')">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="readContent" class="modal-body">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Yeni Filozof Ekle</h2>
                <button class="close-btn" onclick="closeModal('adminModal')">&times;</button>
            </div>
            <form id="addPhiForm" class="admin-form">
                <input type="text" id="phiName" placeholder="Filozof Adı" required>
                <input type="text" id="phiEra" placeholder="Dönem (Örn: Antik Yunan)" required>
                <input type="number" id="phiYear" placeholder="Sıralama Yılı" required>
                <select id="phiRarity" class="modern-select">
                    <option value="common">🟢 Yaygın (Common)</option>
                    <option value="rare">🔵 Nadir (Rare)</option>
                    <option value="legendary">🟡 Efsanevi (Legendary)</option>
                </select>
                <input type="url" id="phiImg" placeholder="Görsel URL">
                <textarea id="phiThought" placeholder="Temel Felsefesi..." rows="3" required></textarea>
                <textarea id="phiQuote" placeholder="Meşhur Sözü..." rows="2"></textarea>
                <div class="modal-footer">
                    <button type="submit" class="btn-save">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
